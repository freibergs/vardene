[mypy]
python_version = 3.12
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = False
warn_unreachable = True
warn_no_return = True
implicit_reexport = False
# Gradual-typing mode: lint what's annotated, don't demand annotations
# everywhere. The library is a 6,000-LOC port; full strict-mode adoption
# is a separate, larger project tracked in CHANGELOG.

[mypy-pyarrow.*]
ignore_missing_imports = True

# pyarrow.compute exports kernel functions dynamically; mypy can't see them.
[mypy-vardene.analyzer]
disable_error_code = attr-defined, union-attr

# Pre-existing None-handling patterns in low-level data containers that are
# safe in practice. Tracked as a separate cleanup; mypy still validates
# everything else, including the modules added in this port (api, splitting,
# phrase, valency).
[mypy-vardene.all_endings]
ignore_errors = True

[mypy-vardene.lexicon]
ignore_errors = True

[mypy-vardene.paradigm]
disable_error_code = call-overload, arg-type, attr-defined

[mypy-vardene.markup]
disable_error_code = unreachable

[mypy-vardene.wordform]
disable_error_code = syntax

[mypy-flask.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-sklearn_crfsuite.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-playwright.*]
ignore_missing_imports = True
