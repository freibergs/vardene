# Pre-commit hooks. Install with: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
        exclude: ^(vardene/data/|paper/.*\.pdf|docs/screenshots/)
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
        # ruff-format is not enforced (we don't use a formatter), but
        # this hook only flags egregious whitespace issues.

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^vardene/
        additional_dependencies:
          - pyarrow
          - flask
