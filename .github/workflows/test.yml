name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e '.[dev,api]' pytest-cov mypy
      - name: Lint (ruff)
        run: ruff check vardene tests examples
      - name: Type-check (mypy)
        run: mypy vardene
      - name: Run tests with coverage
        run: pytest tests/test_unit.py --cov=vardene --cov-report=xml --cov-report=term -v
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Smoke-test the API
        run: |
          python -m vardene.api --port 5757 &
          API_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5757/api/health > /dev/null; then break; fi
            sleep 1
          done
          curl -sf http://127.0.0.1:5757/api/analyze/kaķis | python -c "import sys,json; d=json.loads(sys.stdin.read()); assert d['wordforms']"
          curl -sf http://127.0.0.1:5757/api/inflect_phrase/sarkanā%20māja | python -c "import sys,json; d=json.loads(sys.stdin.read()); assert d['Akuzatīvs'] == 'sarkano māju'"
          curl -sf http://127.0.0.1:5757/api/verbs/mācīt | python -c "import sys,json; d=json.loads(sys.stdin.read()); assert sorted(d) == ['Inf', 'V1', 'V2', 'V3']"
          kill $API_PID || true
      - name: Run example scripts
        run: |
          python examples/01_analyse_a_word.py rakstu
          python examples/02_tag_a_sentence.py "Māte sēd uz galda."
          python examples/03_inflect_phrase.py "sarkanā māja"

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify wheel installs cleanly
        run: |
          python -m venv /tmp/install-test
          /tmp/install-test/bin/pip install dist/*.whl
          /tmp/install-test/bin/python -c "import vardene; from vardene.analyzer import Analyzer; print('OK')"
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
